<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoNow — Controle de Tarefas</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-text">DoNow</span>
  </div>
  <div class="header-stats">
    <div class="stat"><span class="stat-num" id="stat-total">0</span><span>total</span></div>
    <div class="stat"><span class="stat-num" id="stat-done">0</span><span>concluídas</span></div>
  </div>
</header>

<!-- ADD BAR -->
<div class="add-bar">
  <div class="add-form">
    <input class="input-title" id="new-title" type="text" placeholder="Nome da tarefa…" autocomplete="off" />
    <textarea class="input-desc" id="new-desc" placeholder="Descrição (opcional)…"></textarea>
    <button class="btn-add" onclick="addTask()">+ Adicionar</button>
  </div>
</div>

<!-- BOARD -->
<main class="board">
  <!-- PENDENTE -->
  <div class="column col-pending" id="col-pending">
    <div class="column-header">
      <div class="col-title-group">
        <div class="col-indicator"></div>
        <span class="col-name">Pendente</span>
      </div>
    </div>
    <div class="column-body" id="body-pending">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        <span>sem tarefas</span>
      </div>
    </div>
  </div>

  <!-- EM ANDAMENTO -->
  <div class="column col-progress" id="col-progress">
    <div class="column-header">
      <div class="col-title-group">
        <div class="col-indicator"></div>
        <span class="col-name">Em Andamento</span>
      </div>
    </div>
    <div class="column-body" id="body-progress">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <span>sem tarefas</span>
      </div>
    </div>
  </div>

  <!-- CONCLUÍDA -->
  <div class="column col-done" id="col-done">
    <div class="column-header">
      <div class="col-title-group">
        <div class="col-indicator"></div>
        <span class="col-name">Concluída</span>
      </div>
    </div>
    <div class="column-body" id="body-done">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 6L9 17l-5-5"/></svg>
        <span>sem tarefas</span>
      </div>
    </div>
  </div>
</main>

<!-- EDIT MODAL -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <h2>Editar Tarefa</h2>
    <label>Título</label>
    <input type="text" id="edit-title" autocomplete="off" />
    <label>Descrição</label>
    <textarea id="edit-desc" placeholder="Descrição (opcional)…"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toast-container"></div>

<script src="script.js"></script></script>
</body>
</html>
