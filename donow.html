<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DoNow — Controle de Tarefas</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- menu do site -->
<header>
  <div class="logo">
    <div class="bolinha"></div>
    <span class="texto-logo">DoNow</span>
  </div>
</header>

<!-- area pra add tarefa -->
<div class="area-nova">
  <div class="form-add">
    <input class="input-nome" id="titulo-novo" type="text" placeholder="Nome da tarefa…" autocomplete="off" />
    <textarea class="input-desc" id="desc-nova" placeholder="Descrição (opcional)…"></textarea>
    <button class="btn-add" onclick="adicionaTarefa()">+ Adicionar</button>
  </div>
</div>

<!-- BOARD -->
<main class="board">
  <!-- pendentes -->
  <div class="coluna col-pendente" id="col-pendente">
    <div class="header-coluna">
      <div class="info-coluna">
        <div class="bolinhaIndicador"></div>
        <span class="nome-coluna">Pendente</span>
      </div>
    </div>
    <div class="corpo-coluna" id="corpo-pendente">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        <span>sem tarefas</span>
      </div>
    </div>
  </div>

  <!-- em andamento -->
  <div class="coluna col-andamento" id="col-andamento">
    <div class="header-coluna">
      <div class="info-coluna">
        <div class="bolinhaIndicador"></div>
        <span class="nome-coluna">Em Andamento</span>
      </div>
    </div>
    <div class="corpo-coluna" id="corpo-andamento">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <span>sem tarefas</span>
      </div>
    </div>
  </div>

  <!-- concluida -->
  <div class="coluna col-feito" id="col-feito">
    <div class="header-coluna">
      <div class="info-coluna">
        <div class="bolinhaIndicador"></div>
        <span class="nome-coluna">Concluída</span>
      </div>
    </div>
    <div class="corpo-coluna" id="corpo-feito">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 6L9 17l-5-5"/></svg>
        <span>sem tarefas</span>
      </div>
    </div>
  </div>
</main>

<!-- janela pra editar -->
<div class="janela-fundo hidden" id="janela-fundo">
  <div class="modal-box">
    <h2>Editar Tarefa</h2>
    <label>Título</label>
    <input type="text" id="titulo-edit" autocomplete="off" />
    <label>Descrição</label>
    <textarea id="desc-edit" placeholder="Descrição (opcional)…"></textarea>
    <div class="botoes-janela">
      <button class="btn-cancelar" onclick="fechaJanela()">Cancelar</button>
      <button class="btn-salvar" onclick="salvaEdit()">Salvar</button>
    </div>
  </div>
</div>

<!-- template do cartao de tarefa -->
<template id="template-card">
  <div class="card-tarefa">
    <div class="titulo-tarefa"></div>
    <div class="desc-tarefa" style="display:none;"></div>
    <div class="acoes-tarefa">
      <button class="botao-icon btn-prev" style="display:none;">← voltar</button>
      <button class="botao-icon btn-next" style="display:none;">avançar →</button>
      <button class="botao-icon btn-edit">✎ editar</button>
      <button class="botao-icon btn-del">✕ excluir</button>
    </div>
  </div>
</template>

<script src="script.js"></script>
</body>
</html>
